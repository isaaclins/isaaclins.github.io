<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 456" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">How the work loop evolved: from a person prompting a computer to an agent that loops on its own work</title>
  <desc id="desc">A left-to-right progression of small steps — person and computer, then a chatbot with copy-paste, then a model editing code directly, then workflows spinning up sub-agents — leading to a large accented self-referential loop on the right where an agent writes, audits, and re-runs its own work, spawning smaller sub-loops.</desc>

  <style>
    /* SVG is loaded as an image, so it can't inherit the page theme.
       It carries its own light/dark palette. Default = light. */
    :root {
      --ink: #1a1a1a;       /* text + strokes */
      --muted: #6b6b6b;     /* secondary text */
      --faint: #c9c9c9;     /* early/linear strokes */
      --accent: #3548cf;    /* light-mode accent (matches bar-chart) */
      --accent-soft: rgba(53, 72, 207, 0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #ededed;
        --muted: #9a9a9a;
        --faint: #4a4a4a;
        --accent: #79a8ff;  /* dark-mode accent (matches bar-chart) */
        --accent-soft: rgba(121, 168, 255, 0.16);
      }
    }
    .ink   { fill: var(--ink); }
    .muted { fill: var(--muted); }
    .accent{ fill: var(--accent); }
    .stroke-ink    { stroke: var(--ink);   fill: none; }
    .stroke-faint  { stroke: var(--faint); fill: none; }
    .stroke-accent { stroke: var(--accent);fill: none; }
    .node { stroke: var(--faint); fill: none; }
    text { font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace; }
    .label   { font-size: 13px; font-weight: 600; }
    .sub      { font-size: 11px; }
    .stage   { font-size: 11px; letter-spacing: 0.06em; }
    .hero    { font-size: 15px; font-weight: 700; }
    .heroline{ font-size: 12px; }
  </style>

  <defs>
    <marker id="arrow-faint" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--faint)"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/>
    </marker>
  </defs>

  <!-- ============ THE LINEAR PAST (faint, small) ============ -->
  <text x="20" y="34" class="stage muted">THE WORK LOOP, OVER TIME</text>

  <!-- step 1: person + computer -->
  <g>
    <circle cx="64" cy="118" r="22" class="node"/>
    <text x="64" y="115" text-anchor="middle" class="label ink">you</text>
    <text x="64" y="130" text-anchor="middle" class="sub muted">+ pc</text>
    <text x="64" y="166" text-anchor="middle" class="sub muted">type code</text>
  </g>
  <line x1="90" y1="118" x2="130" y2="118" class="stroke-faint" stroke-width="1.4" marker-end="url(#arrow-faint)"/>

  <!-- step 2: chatbot, copy-paste -->
  <g>
    <circle cx="160" cy="118" r="22" class="node"/>
    <text x="160" y="115" text-anchor="middle" class="label ink">chat</text>
    <text x="160" y="130" text-anchor="middle" class="sub muted">bot</text>
    <text x="160" y="166" text-anchor="middle" class="sub muted">copy-paste</text>
  </g>
  <line x1="186" y1="118" x2="226" y2="118" class="stroke-faint" stroke-width="1.4" marker-end="url(#arrow-faint)"/>

  <!-- step 3: model edits code directly (IDE/terminal) -->
  <g>
    <circle cx="256" cy="118" r="22" class="node"/>
    <text x="256" y="115" text-anchor="middle" class="label ink">IDE</text>
    <text x="256" y="130" text-anchor="middle" class="sub muted">term</text>
    <text x="256" y="166" text-anchor="middle" class="sub muted">edits code</text>
  </g>
  <line x1="282" y1="118" x2="322" y2="118" class="stroke-faint" stroke-width="1.4" marker-end="url(#arrow-faint)"/>

  <!-- step 4: workflows + sub-agents -->
  <g>
    <circle cx="352" cy="118" r="22" class="node"/>
    <text x="352" y="115" text-anchor="middle" class="label ink">work</text>
    <text x="352" y="130" text-anchor="middle" class="sub muted">flows</text>
    <text x="352" y="166" text-anchor="middle" class="sub muted">sub-agents</text>
  </g>

  <!-- transition into the hero -->
  <path d="M378 118 C 420 118, 430 200, 470 224" class="stroke-faint" stroke-width="1.4" marker-end="url(#arrow-faint)"/>

  <!-- ============ THE HERO: THE AGENT LOOP (accent, big) ============ -->
  <text x="700" y="34" text-anchor="end" class="stage accent">NOW: THE AGENT LOOPS ON ITSELF</text>

  <!-- big self-referential loop, centered around (560, 250) -->
  <!-- main ring -->
  <circle cx="560" cy="250" r="120" class="stroke-accent" stroke-width="2.4" stroke-dasharray="0"/>
  <!-- arrowheads riding the ring to show it spins -->
  <path d="M560 130 a120 120 0 0 1 14 1" class="stroke-accent" stroke-width="2.4" marker-end="url(#arrow-accent)"/>

  <!-- three nodes on the ring: write / audit / re-run -->
  <g>
    <circle cx="560" cy="146" r="30" fill="var(--accent-soft)" class="stroke-accent" stroke-width="1.6"/>
    <text x="560" y="151" text-anchor="middle" class="hero ink">write</text>
  </g>
  <g>
    <circle cx="664" cy="308" r="30" fill="var(--accent-soft)" class="stroke-accent" stroke-width="1.6"/>
    <text x="664" y="306" text-anchor="middle" class="hero ink">audit</text>
    <text x="664" y="320" text-anchor="middle" class="heroline muted">review</text>
  </g>
  <g>
    <circle cx="456" cy="308" r="30" fill="var(--accent-soft)" class="stroke-accent" stroke-width="1.6"/>
    <text x="456" y="306" text-anchor="middle" class="hero ink">re-run</text>
    <text x="456" y="320" text-anchor="middle" class="heroline muted">on notes</text>
  </g>

  <!-- center label -->
  <text x="560" y="246" text-anchor="middle" class="hero accent">agent</text>
  <text x="560" y="264" text-anchor="middle" class="heroline muted">prompts itself</text>

  <!-- ============ SUB-LOOPS SPAWNED BY THE BIG LOOP ============ -->
  <!-- a small loop spun off from "re-run" / "audit": loop that makes loops -->
  <g>
    <path d="M520 372 C 540 408, 470 420, 462 392 C 456 372, 496 364, 510 384"
          class="stroke-accent" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
    <circle cx="488" cy="392" r="3" class="accent"/>
    <text x="476" y="430" text-anchor="middle" class="sub muted">sub-loop:</text>
    <text x="476" y="431" dy="14" text-anchor="middle" class="sub muted">review thread</text>
  </g>
  <g>
    <path d="M636 372 C 656 408, 586 420, 578 392 C 572 372, 612 364, 626 384"
          class="stroke-accent" stroke-width="1.6" marker-end="url(#arrow-accent)"/>
    <circle cx="604" cy="392" r="3" class="accent"/>
    <text x="640" y="430" text-anchor="middle" class="sub muted">sub-loop:</text>
    <text x="640" y="431" dy="14" text-anchor="middle" class="sub muted">stack next PR</text>
  </g>

  <!-- faint connectors hinting the loops spawn dynamically -->
  <line x1="456" y1="338" x2="500" y2="376" class="stroke-faint" stroke-width="1.2" stroke-dasharray="2 3"/>
  <line x1="664" y1="338" x2="616" y2="376" class="stroke-faint" stroke-width="1.2" stroke-dasharray="2 3"/>
</svg>
